<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <h1>회원가입</h1>
  <p>SKALA-FRONT 회원가입을 환영합니다.</p>

  <form action="signUpResult.html" method="get">
    <fieldset>
      <legend>계정 정보</legend>
      <p>
        <label for="userId">아이디: </label>
        <input type="text" id="userId" name="userId" minlength="4" maxlength="15" required placeholder="4~15자 영문/숫자">
        <small>(필수)</small>
      </p>
      <p>
        <label for="userPw">비밀번호: </label>
        <input type="password" id="userPw" name="userPw" minlength="8" required placeholder="8자 이상 입력">
        <small>(필수)</small>
      </p>
      <p>
        <label for="userEmail">이메일: </label>
        <input type="text" id="userEmail" name="userEmail" placeholder="example">
        @
        <select name="emailDomain">
          <option value="direct">직접 입력</option>
          <option value="naver.com">naver.com</option>
          <option value="gmail.com">gmail.com</option>
          <option value="daum.net">daum.net</option>
        </select>
      </p>
    </fieldset>

    <fieldset>
      <legend>개인 프로필 정보</legend>
      <p>
        <label for="userName">이름: </label>
        <input type="text" id="userName" name="userName" required placeholder="이름을 입력하세요">
      </p>
      <p>
        <label for="userBirth">생년월일: </label>
        <input type="date" id="userBirth" name="userBirth">
      </p>
      <p>
        성별:
        <label><input type="radio" name="gender" value="male" checked> 남성</label>
        <label><input type="radio" name="gender" value="female"> 여성</label>
        <label><input type="radio" name="gender" value="none"> 선택안함</label>
      </p>
      <p>
        관심 분야 (중복 선택 가능): <br>
        <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (HTML/CSS/JavaScript)</label><br>
        <label><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label><br>
        <label><input type="checkbox" name="interest" value="data"> 데이터 분석 & Python</label><br>
        <label><input type="checkbox" name="interest" value="finance"> 금융 IT & 핀테크</label>
      </p>
      <p>
        <label for="referral">가입 경로: </label>
        <select id="referral" name="referral">
          <option value="">-- 선택해 주세요 --</option>
          <option value="friend">지인 추천</option>
          <option value="sns">SNS</option>
          <option value="search">검색</option>
          <option value="etc">기타</option>
        </select>
      </p>
    </fieldset>

    <fieldset>
      <legend>자기소개</legend>
      <p>
        <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
        <textarea id="intro" name="intro" rows="5" cols="50" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
      </p>
    </fieldset>

    <br>
    <input type="submit" value="동의하고 회원가입">
    <input type="reset" value="다시 작성">
  </form>
</body>
</html>
