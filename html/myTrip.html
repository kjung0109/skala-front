<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="뉴욕·LA·라스베가스 여행 사진과 브이로그 영상, 배경 음악을 담은 여행 앨범 페이지입니다.">
  <title>나의 여행지</title>
  <link rel="icon" type="image/svg+xml" href="../media/favicon.svg">
  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" aria-label="다크모드 전환">🌙</button>
  <div class="container">
  <header class="hero">
    <a href="index.html" class="home-link">← 홈으로</a>
    <div class="hero-icon">🌍</div>
    <h1>나의 여행 앨범</h1>
    <p>미국 서부/동부를 가로지르며 다녀온 뉴욕, LA, 라스베가스 여행 기록입니다. 사진과 영상, 배경 음악으로 그 순간을 담았습니다.</p>
  </header>

  <section class="section-card">
    <h2>🎵 여행 배경 음악</h2>
    <audio controls>
      <source src="../media/trip-bgm.mp3" type="audio/mpeg">
      현재 브라우저는 audio 태그를 지원하지 않습니다.
    </audio>
  </section>

  <section class="section-card">
    <h2>📸 여행 사진</h2>
    <div class="trip-gallery">
      <figure class="trip-card">
        <img src="../media/photo1.jpg" alt="뉴욕 스카이라인">
        <figcaption>
          <strong>뉴욕</strong> <span class="trip-year">2024년</span>
          <small>사진: Dllu, Wikimedia Commons (CC BY-SA 4.0)</small>
        </figcaption>
      </figure>
      <figure class="trip-card">
        <img src="../media/photo2.jpg" alt="LA 다운타운 야경">
        <figcaption>
          <strong>LA</strong> <span class="trip-year">2020년</span>
          <small>사진: Camiloarenivar, Wikimedia Commons (CC BY-SA 4.0)</small>
        </figcaption>
      </figure>
      <figure class="trip-card">
        <img src="../media/photo3.jpg" alt="라스베가스 스트립 야경">
        <figcaption>
          <strong>라스베가스</strong> <span class="trip-year">2024년</span>
          <small>사진: Clément Bardot, Wikimedia Commons (CC BY-SA 3.0)</small>
        </figcaption>
      </figure>
    </div>
  </section>

  <section class="section-card">
    <h2>🎬 나의 여행 브이로그</h2>
    <video controls>
      <source src="../media/trip-vlog.mp4" type="video/mp4">
      현재 브라우저는 video 태그를 지원하지 않습니다.
    </video>
  </section>
  </div>
  <script src="../script/darkMode.js"></script>
  <script src="../script/scrollReveal.js"></script>
  <script src="../script/backToTop.js"></script>
</body>
</html>
